<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px;
    min-height: 200px;
    max-height: 500px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    font-size: 13px;
    color: #e0e0e0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #222;
    border-bottom: 1px solid #333;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #e53935;
  }
  header .actions { display: flex; gap: 6px; }
  button {
    background: #333;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { background: #444; color: #fff; }
  button.danger { color: #e53935; }
  button.danger:hover { background: #e53935; color: #fff; }
  #status {
    padding: 4px 14px;
    font-size: 11px;
    color: #888;
    background: #1e1e1e;
    display: none;
  }
  #list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .endpoint {
    padding: 8px 14px;
    border-bottom: 1px solid #2a2a2a;
  }
  .endpoint:hover { background: #222; }
  .endpoint .url {
    word-break: break-all;
    color: #4fc3f7;
    font-size: 12px;
    line-height: 1.4;
  }
  .snippet {
    margin-top: 5px;
    padding: 4px 8px;
    background: #111;
    border-left: 2px solid #e53935;
    border-radius: 2px;
    overflow-x: auto;
    white-space: pre;
    scrollbar-width: thin;
  }
  .snippet code {
    font-family: "Consolas", "Monaco", monospace;
    font-size: 11px;
    color: #aaa;
    line-height: 1.4;
  }
  .endpoint .meta {
    margin-top: 3px;
    font-size: 11px;
    color: #666;
  }
  .endpoint .meta span { margin-right: 12px; }
  .copy-btn {
    float: right;
    padding: 1px 6px;
    font-size: 10px;
    color: #4fc3f7;
    border-color: #4fc3f7;
    background: transparent;
  }
  .copy-btn:hover { background: #4fc3f7; color: #1a1a1a; }
  #search {
    width: 100%;
    padding: 6px 14px;
    background: #111;
    border: none;
    border-bottom: 1px solid #333;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  #search::placeholder { color: #555; }
  #search:focus { border-bottom-color: #e53935; }
  .empty {
    padding: 40px 14px;
    text-align: center;
    color: #555;
  }
</style>
</head>
<body>
  <header>
    <h1>CallMe</h1>
    <div class="actions">
      <button id="export">Export</button>
      <button id="clear" class="danger">Clear</button>
    </div>
  </header>
  <input type="text" id="search" placeholder="Filter by URL, param, snippet...">
  <div id="status"></div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
